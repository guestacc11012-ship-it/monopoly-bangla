<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কোটিপতি (বাংলাদেশী মনোপলি)</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            color: #2c3e50;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .game-container {
            display: block;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 40 Cells Monopoly Board Design (11x11 Grid) */
        .board {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 2px;
            background-color: #2c3e50;
            padding: 4px;
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
            aspect-ratio: 1 / 1;
            margin: 0 auto 20px auto;
        }
        .cell {
            background-color: #fff;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 8px;
            font-weight: bold;
            text-align: center;
            overflow: hidden;
            word-break: break-word;
        }
        .cell-header {
            height: 10px;
            margin: -4px -4px 4px -4px;
        }
        
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 700px;
            margin: 0 auto;
        }
        .flex-row {
            display: table;
            width: 100%;
            margin-bottom: 15px;
        }
        .flex-col {
            display: table-cell;
            width: 50%;
            vertical-align: top;
            padding: 5px;
        }
        .player-status {
            padding: 10px;
            border-left: 5px solid #ccc;
            background: #fdfdfd;
            border-radius: 4px;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.05);
        }
        .p0-border { border-color: #e74c3c; }
        .p1-border { border-color: #3498db; }
        .p2-border { border-color: #2ecc71; }
        .p3-border { border-color: #f1c40f; }
        
        .dice-area {
            text-align: center;
            margin: 15px 0;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #27ae60; }
        .log {
            margin-top: 15px;
            height: 150px;
            overflow-y: auto;
            background: #1e272e;
            color: #0be881;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            text-align: left;
            line-height: 1.5;
        }
        .token {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin: 1px;
            text-align: center;
            color: white;
            font-size: 8px;
            line-height: 14px;
        }
        .token-p0 { background-color: #e74c3c; }
        .token-p1 { background-color: #3498db; }
        .token-p2 { background-color: #2ecc71; }
        .token-p3 { background-color: #f1c40f; }

        /* Surprise Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
        }
        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 25px;
            border-radius: 10px;
            width: 80%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-title {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .modal-body {
            font-size: 16px;
            margin-bottom: 20px;
            color: #34495e;
            line-height: 1.6;
        }
        .modal-btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>💰 কোটিপতি: ধনী হবার লড়াই 💰</h1>
    <div class="subtitle">বাংলাদেশী ৪০ ঘরের সম্পূর্ণ মনোপলি বোর্ড (ভাগ্য পরীক্ষা ও পপ-আপ কার্ড সহ)</div>
    
    <div class="game-container">
        <div class="board" id="board"></div>

        <div class="control-panel">
            <div class="flex-row">
                <div class="flex-col">
                    <h3>খেলোয়াড়দের অবস্থা</h3>
                    <div id="players-info"></div>
                </div>
                <div class="flex-col" style="text-align: center;">
                    <h3 id="current-turn" style="color: #d35400; margin-top: 20px;">চাল: প্লেয়ার ১</h3>
                    <div class="dice-area">
                        <button id="roll-btn" onclick="playTurn()">🎲 ছক্কা চালুন (Roll Dice)</button>
                    </div>
                </div>
            </div>
            <div class="log" id="game-log">খেলা শুরু করার জন্য ছক্কা চালুন...<br></div>
        </div>
    </div>

    <!-- Surprise Card Modal Container -->
    <div id="cardModal" class="modal">
        <div class="modal-content">
            <div id="mTitle" class="modal-title"></div>
            <div id="mBody" class="modal-body"></div>
            <button class="modal-btn" onclick="closeModal()">ঠিক আছে</button>
        </div>
    </div>

<script>
    // 40 cells definition matching classic Monopoly layout
    const boardData = [
        { id: 0, name: "শুরু (GO)", type: "special", color: "#2ecc71", price: 0, rent: 0 },
        { id: 1, name: "সায়েদাবাদ", type: "property", color: "#8b5a2b", price: 1200, rent: 100 },
        { id: 2, name: "জনকল্যাণ তহবিল", type: "chest", color: "", price: 0, rent: 0 },
        { id: 3, name: "গাবতলী", type: "property", color: "#8b5a2b", price: 1500, rent: 120 },
        { id: 4, name: "আয়কর (Income Tax)", type: "tax", color: "", price: 0, rent: 2000 },
        { id: 5, name: "সদরঘাট লঞ্চ টার্মিনাল", type: "transport", color: "#7f8c8d", price: 4000, rent: 500 },
        { id: 6, name: "মিরপুর-১০", type: "property", color: "#3498db", price: 2000, rent: 160 },
        { id: 7, name: "ভাগ্যের চাকা (Chance)", type: "chance", color: "", price: 0, rent: 0 },
        { id: 8, name: "মিরপুর-১২", type: "property", color: "#3498db", price: 2200, rent: 180 },
        { id: 9, name: "উত্তরা", type: "property", color: "#3498db", price: 2600, rent: 220 },
        { id: 10, name: "জেলখানা (Visiting)", type: "special", color: "#f1c40f", price: 0, rent: 0 },
        { id: 11, name: "ফার্মগেট", type: "property", color: "#e91e63", price: 3000, rent: 260 },
        { id: 12, name: "ডেসকো (বিদ্যুৎ)", type: "utility", color: "#a4b0be", price: 3000, rent: 300 },
        { id: 13, name: "কারওয়ান বাজার", type: "property", color: "#e91e63", price: 3200, rent: 280 },
        { id: 14, name: "শাহবাগ", type: "property", color: "#e91e63", price: 3600, rent: 320 },
        { id: 15, name: "কমলাপুর স্টেশন", type: "transport", color: "#7f8c8d", price: 4000, rent: 500 },
        { id: 16, name: "পল্টন", type: "property", color: "#ff9800", price: 4000, rent: 350 },
        { id: 17, name: "জনকল্যাণ তহবিল", type: "chest", color: "", price: 0, rent: 0 },
        { id: 18, name: "মতিঝিল", type: "property", color: "#ff9800", price: 4200, rent: 380 },
        { id: 19, name: "দিলকুশা", type: "property", color: "#ff9800", price: 4600, rent: 420 },
        { id: 20, name: "ফ্রি পার্কিং", type: "special", color: "#95a5a6", price: 0, rent: 0 },
        { id: 21, name: "ধানমন্ডি", type: "property", color: "#e74c3c", price: 5000, rent: 480 },
        { id: 22, name: "ভাগ্যের চাকা (Chance)", type: "chance", color: "", price: 0, rent: 0 },
        { id: 23, name: "মোহাম্মদপুর", type: "property", color: "#e74c3c", price: 5200, rent: 500 },
        { id: 24, name: "লালমাটিয়া", type: "property", color: "#e74c3c", price: 5600, rent: 550 },
        { id: 25, name: "মহাখালী টার্মিনাল", type: "transport", color: "#7f8c8d", price: 4000, rent: 500 },
        { id: 26, name: "বনানী", type: "property", color: "#ecc94b", price: 6000, rent: 600 },
        { id: 27, name: "মহাখালী", type: "property", color: "#ecc94b", price: 6200, rent: 620 },
        { id: 28, name: "ওয়াসা (পানি)", type: "utility", color: "#a4b0be", price: 3000, rent: 300 },
        { id: 29, name: "নিকেতন", type: "property", color: "#ecc94b", price: 6600, rent: 680 },
        { id: 30, name: "জেলে যাও", type: "special", color: "#962d2d", price: 0, rent: 0 },
        { id: 31, name: "গুলশান-১", type: "property", color: "#27ae60", price: 7000, rent: 750 },
        { id: 32, name: "গুলশান-২", type: "property", color: "#27ae60", price: 7500, rent: 800 },
        { id: 33, name: "জনকল্যাণ তহবিল", type: "chest", color: "", price: 0, rent: 0 },
        { id: 34, name: "বারিধারা", type: "property", color: "#27ae60", price: 8000, rent: 900 },
        { id: 35, name: "হযরত শাহজালাল বিমানবন্দর", type: "transport", color: "#7f8c8d", price: 5000, rent: 700 },
        { id: 36, name: "ভাগ্যের চাকা (Chance)", type: "chance", color: "", price: 0, rent: 0 },
        { id: 37, name: "বсуন্ধরা আ/এ", type: "property", color: "#9b59b6", price: 9000, rent: 1100 },
        { id: 38, name: "ভ্যাট (VAT Tax)", type: "tax", color: "", price: 0, rent: 1500 },
        { id: 39, name: "পূর্বাচল", type: "property", color: "#9b59b6", price: 12000, rent: 1600 }
    ];

    // Surprise Card Deck definitions
    const chanceCards = [
        { text: "🚥 সিগন্যাল ভেঙেছেন! ট্রাফিক জ্যামে পুলিশ আপনাকে ৫০০ টাকা জরিমানা করেছে।", money: -500 },
        { text: "🎉 লটারি জিতেছেন! ব্যাংক আপনাকে ৩,০০০ টাকা পুরস্কার দিল।", money: 3000 },
        { text: "📈 শেয়ার বাজারে দারুণ লাভ! ২,৫০০ টাকা প্রফিট পেলেন।", money: 2500 },
        { text: "💸 পকেটমার! সদরঘাটে আপনার ১,০০০ টাকা হারিয়ে গেল।", money: -1000 },
        { text: "🎁 আপনার জন্মদিন! ব্যাংক থেকে উপহারস্বরূপ ১,৫০০ টাকা পেলেন।", money: 1500 }
    ];

    const chestCards = [
        { text: "💍 মামাতো ভাইয়ের বিয়ে! বন্ধুদের রেস্টুরেন্টে খাওয়াতে গিয়ে ২,০০০ টাকা খরচ হলো।", money: -2000 },
        { text: "🏦 ভুলবশত ব্যাংকের লাভ! আপনার অ্যাকাউন্টে ভুল করে ১,৫০০ টাকা চলে এসেছে।", money: 1500 },
        { text: "🧾 ইনকাম ট্যাক্স রিটার্ন রিফান্ড পেলেন ১,০০০ টাকা।", money: 1000 },
        { text: "🏥 স্কয়ার হাসপাতালে মেডিকেল চেকআপের জন্য ১,২০০ টাকা বিল দিলেন।", money: -1200 },
        { text: "🥇 এলাকার টুর্নামেন্টে চ্যাম্পিয়ন হয়ে ২,৫০০ টাকা পুরস্কার পেলেন!", money: 2500 }
    ];

    // Grid coordinates mapping for 11x11 perimeter
    const gridMap = {};
    for (let i = 0; i <= 10; i++) gridMap[i] = { r: 11, c: 11 - i };
    for (let i = 11; i <= 19; i++) gridMap[i] = { r: 11 - (i - 10), c: 1 };
    for (let i = 20; i <= 30; i++) gridMap[i] = { r: 1, c: i - 19 };
    for (let i = 31; i <= 39; i++) gridMap[i] = { r: i - 29, c: 11 };

    // Game state
    let players = [
        { id: 0, name: "প্লেয়ার ১ (লাল)", money: 20000, pos: 0 },
        { id: 1, name: "প্লেয়ার ২ (নীল)", money: 20000, pos: 0 },
        { id: 2, name: "প্লেয়ার ৩ (সবুজ)", money: 20000, pos: 0 },
        { id: 3, name: "প্লেয়ার ৪ (হলুদ)", money: 20000, pos: 0 }
    ];
    let turn = 0;
    let owners = {}; // cellId -> playerId

    const boardEl = document.getElementById('board');

    function drawBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 40; i++) {
            const cell = boardData[i];
            const coord = gridMap[i];
            
            const cellEl = document.createElement('div');
            cellEl.className = 'cell';
            cellEl.style.gridRow = coord.r;
            cellEl.style.gridColumn = coord.c;

            let headerHtml = (cell.type === 'property' || cell.type === 'transport' || cell.type === 'utility') 
                ? `<div class="cell-header" style="background-color:${cell.color || '#7f8c8d'}"></div>` : '';
            
            let priceHtml = cell.price > 0 ? `<div style="color:#7f8c8d; font-size:7px;">৳${cell.price}</div>` : '';
            let ownerText = owners[i] !== undefined ? `<span style="color:purple; font-size:7px;">[P${owners[i]+1}]</span>` : '';

            let tokensHtml = '<div style="margin-top:2px;">';
            players.forEach(p => {
                if (p.pos === i) {
                    tokensHtml += `<span class="token token-p${p.id}">P${p.id+1}</span>`;
                }
            });
            tokensHtml += '</div>';

            cellEl.innerHTML = `
                <div>
                    ${headerHtml}
                    <span style="display:block; line-height:1;">${cell.name}</span> ${ownerText}
                </div>
                <div>
                    ${priceHtml}
                    ${tokensHtml}
                </div>
            `;
            boardEl.appendChild(cellEl);
        }
    }

    function updateUI() {
        drawBoard();
        const infoEl = document.getElementById('players-info');
        infoEl.innerHTML = players.map(p => `
            <div class="player-status p${p.id}-border" style="margin-bottom:5px;">
                <strong>${p.name}</strong>: ৳${p.money}
            </div>
        `).join('');
        document.getElementById('current-turn').innerText = `চাল: ${players[turn].name}`;
    }

    function logMessage(msg) {
        const log = document.getElementById('game-log');
        log.innerHTML += msg + "<br>";
        log.scrollTop = log.scrollHeight;
    }

    // Modal Control Functions
    function showModal(title, text, color) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mTitle').style.color = color;
        document.getElementById('mBody').innerText = text;
        document.getElementById('cardModal').style.display = "block";
        document.getElementById('roll-btn').disabled = true; // চাল দেওয়া সাময়িক বন্ধ
    }

    function closeModal() {
        document.getElementById('cardModal').style.display = "none";
        document.getElementById('roll-btn').disabled = false;
        
        // পরের প্লেয়ারের চালে যাওয়া
        turn = (turn + 1) % 4;
        updateUI();
    }

    function playTurn() {
        let p = players[turn];
        let dice1 = Math.floor(Math.random() * 6) + 1;
        let dice2 = Math.floor(Math.random() * 6) + 1;
        let totalDice = dice1 + dice2;
        
        logMessage(`🎲 <strong>${p.name}</strong> ছক্কা চেলেছেন: [${dice1}, ${dice2}] = <strong>${totalDice}</strong>`);

        let oldPos = p.pos;
        p.pos = (p.pos + totalDice) % 40;

        if (p.pos < oldPos) {
            p.money += 2000;
            logMessage(`💰 ${p.name} 'শুরু' ঘর পার হওয়ায় ২০০০ টাকা বোনাস পেলেন!`);
        }

        let currentCell = boardData[p.pos];
        logMessage(`📍 অবস্থান: <strong>${currentCell.name}</strong>`);

        let requireModalCloseChangeTurn = true;

        if (currentCell.name === "জেলে যাও") {
            p.pos = 10; 
            logMessage(`👮 ${p.name} সোজা জেলখানায় চলে গেলেন!`);
        } else if (currentCell.type === "tax") {
            p.money -= currentCell.rent;
            logMessage(`💸 ${p.name} ব্যাংককে ৳${currentCell.rent} ট্যাক্স দিলেন।`);
        } else if (currentCell.type === "property" || currentCell.type === "transport" || currentCell.type === "utility") {
            let owner = owners[p.pos];
            if (owner === undefined) {
                if (p.money >= currentCell.price) {
                    p.money -= currentCell.price;
                    owners[p.pos] = p.id;
                    logMessage(`🏠 ${p.name} ৳${currentCell.price} দিয়ে এলাকাটি কিনে নিলেন!`);
                } else {
                    logMessage(`💸 টাকা কম থাকায় ${p.name} জায়গাটি কিনতে পারলেন না।`);
                }
            } else if (owner !== p.id) {
                let rent = currentCell.rent;
                p.money -= rent;
                players[owner].money += rent;
                logMessage(`💸 এটি ${players[owner].name}-এর জায়গা! ${p.name} ৳${rent} ভাড়া দিলেন।`);
            }
        } else if (currentCell.type === "chance") {
            // Pick random chance card
            let card = chanceCards[Math.floor(Math.random() * chanceCards.length)];
            p.money += card.money;
            logMessage(`🃏 ভাগ্যের চাকা: ${card.text}`);
            showModal("🔮 ভাগ্যের চাকা (Chance Card)", card.text, "#e67e22");
            requireModalCloseChangeTurn = false; // টার্ন পরিবর্তন ক্লোজ বাটনে হবে
        } else if (currentCell.type === "chest") {
            // Pick random chest card
            let card = chestCards[Math.floor(Math.random() * chestCards.length)];
            p.money += card.money;
            logMessage(`🎁 জনকল্যাণ তহবিল: ${card.text}`);
            showModal("🏢 জনকল্যাণ তহবিল (Community Chest)", card.text, "#2980b9");
            requireModalCloseChangeTurn = false; 
        }

        if (p.money <= 0) {
            logMessage(`❌ 💥 <strong>${p.name} দেউলিয়া হয়ে গেছেন!</strong>`);
        }

        if (requireModalCloseChangeTurn) {
            turn = (turn + 1) % 4;
            updateUI();
        } else {
            drawBoard(); // শুধু অবস্থান দেখানোর জন্য ড্র করা
        }
    }

    updateUI();
</script>
</body>
</html>
